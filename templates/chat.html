<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Character Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f5f5;
  --chat-bg: #ededed;
  --user-bubble: #95ec69;
  --char-bubble: #fff;
  --header-bg: #2e2e2e;
  --text: #333;
  --text-light: #999;
  --border: #e0e0e0;
  --accent: #07c160;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: var(--header-bg);
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.header .avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.header .info { flex: 1; }
.header .name { font-size: 15px; font-weight: 500; }
.header .status-text { font-size: 11px; color: #aaa; margin-top: 2px; }

.header-buttons {
  display: flex;
  gap: 6px;
}

.header .hdr-btn {
  cursor: pointer;
  font-size: 11px;
  color: #ccc;
  padding: 4px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.1);
  border: none;
  white-space: nowrap;
}
.header .hdr-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* Time Control Bar */
.time-bar {
  background: #1e1e2e;
  color: #e0e0e0;
  padding: 6px 16px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  font-family: "SF Mono", "Fira Code", monospace;
  border-bottom: 1px solid #333;
}

.time-bar .time-display {
  color: #4ecdc4;
  font-weight: bold;
  min-width: 180px;
}

.time-bar .speed-controls {
  display: flex;
  align-items: center;
  gap: 4px;
}

.time-bar .speed-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid #444;
  color: #ccc;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
}
.time-bar .speed-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
.time-bar .speed-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.time-bar .jump-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
}

.time-bar .jump-btn {
  background: rgba(255,107,107,0.15);
  border: 1px solid #664;
  color: #ff9a9e;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
}
.time-bar .jump-btn:hover { background: rgba(255,107,107,0.3); }

.time-bar .pause-btn {
  background: rgba(249,199,79,0.15);
  border: 1px solid #664;
  color: #f9c74f;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
}
.time-bar .pause-btn:hover { background: rgba(249,199,79,0.3); }

/* Chat Area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: var(--chat-bg);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message-group {
  display: flex;
  gap: 8px;
  max-width: 75%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-group.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message-group.char {
  align-self: flex-start;
}

/* Proactive messages have a subtle indicator */
.message-group.char.proactive .msg-avatar.char-avatar {
  box-shadow: 0 0 0 2px #f9c74f;
}

.msg-avatar {
  width: 36px; height: 36px;
  border-radius: 4px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.msg-avatar.user-avatar {
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.msg-avatar.char-avatar {
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

.msg-bubbles {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.bubble {
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  position: relative;
}

.user .bubble {
  background: var(--user-bubble);
  color: #000;
  border-top-right-radius: 2px;
}

.char .bubble {
  background: var(--char-bubble);
  color: var(--text);
  border-top-left-radius: 2px;
  box-shadow: 0 1px 1px rgba(0,0,0,0.05);
}

.bubble.read-receipt {
  background: transparent;
  color: var(--text-light);
  font-size: 12px;
  padding: 4px 0;
  font-style: italic;
  box-shadow: none;
}

/* Proactive event label */
.proactive-label {
  font-size: 10px;
  color: #f9c74f;
  margin-bottom: 2px;
  font-style: italic;
}

/* Typing indicator */
.typing-indicator {
  display: none;
  align-self: flex-start;
  padding: 0 8px;
}

.typing-indicator .dots {
  display: flex; gap: 4px; align-items: center;
  background: var(--char-bubble);
  padding: 10px 16px;
  border-radius: 6px;
  box-shadow: 0 1px 1px rgba(0,0,0,0.05);
}

.typing-indicator .dot {
  width: 7px; height: 7px;
  background: #999;
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}
.typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* Input Area */
.input-area {
  background: #fff;
  padding: 10px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-area textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  max-height: 120px;
  min-height: 40px;
  outline: none;
  line-height: 1.5;
}

.input-area textarea:focus {
  border-color: var(--accent);
}

.send-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
  height: 40px;
}

.send-btn:hover { background: #06ad56; }
.send-btn:disabled { background: #ccc; cursor: not-allowed; }
.send-btn.queued { background: #05a050; } /* subtle indicator that messages are queued */

/* Debug Panel */
.debug-panel {
  display: none;
  background: #1a1a2e;
  color: #e0e0e0;
  padding: 12px 16px;
  font-size: 12px;
  font-family: "SF Mono", "Fira Code", monospace;
  max-height: 200px;
  overflow-y: auto;
  border-top: 2px solid #16213e;
  flex-shrink: 0;
}

.debug-panel.visible { display: block; }

.debug-panel .section { margin-bottom: 6px; }
.debug-panel .label { color: #ff6b6b; font-weight: bold; }
.debug-panel .value { color: #4ecdc4; }

.debug-panel .thought {
  color: #f9c74f;
  font-style: italic;
  margin-top: 4px;
  padding: 4px 8px;
  background: rgba(249, 199, 79, 0.1);
  border-radius: 4px;
}

/* Time divider */
.time-divider {
  text-align: center;
  font-size: 11px;
  color: #999;
  padding: 8px 0;
}

/* Init overlay */
.init-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.init-overlay.hidden { display: none; }

.init-card {
  background: #fff;
  border-radius: 12px;
  padding: 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
}

.init-card h2 { margin-bottom: 16px; font-size: 20px; }

.init-card p {
  color: #666;
  margin-bottom: 24px;
  font-size: 14px;
  line-height: 1.6;
}

.init-card .btn {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 32px;
  font-size: 15px;
  cursor: pointer;
  margin: 4px;
}

.init-card .btn.secondary { background: #f5f5f5; color: #333; }
.init-card .btn:hover { opacity: 0.9; }

.init-card .loading {
  display: none;
  margin-top: 16px;
  color: #666;
}

.init-card .loading.visible { display: block; }

.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid #ccc;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Init Overlay -->
<div class="init-overlay" id="initOverlay">
  <div class="init-card">
    <h2 id="initTitle">AI Character Chat</h2>
    <p id="initDesc">Generate a unique character with their own life, personality, and emotions</p>
    <div id="initButtons">
      <button class="btn" onclick="initNew()">New Character</button>
      <button class="btn secondary" id="loadBtn" onclick="loadExisting()" style="display:none;">Load Existing</button>
    </div>
    <div class="loading" id="initLoading">
      <span class="spinner"></span>
      <span id="initStatus">Generating character...</span>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="avatar" id="charAvatar">?</div>
  <div class="info">
    <div class="name" id="charName">Waiting...</div>
    <div class="status-text" id="charStatus">Offline</div>
  </div>
  <div class="header-buttons">
    <button class="hdr-btn" onclick="toggleDebug()">Debug</button>
  </div>
</div>

<!-- Time Control Bar -->
<div class="time-bar" id="timeBar">
  <div class="time-display" id="timeDisplay">-- : --</div>
  <div class="speed-controls">
    <span style="color:#888;">Speed:</span>
    <button class="speed-btn" onclick="setSpeed(0)" title="Pause">||</button>
    <button class="speed-btn" onclick="setSpeed(1)" title="Real-time">1x</button>
    <button class="speed-btn active" onclick="setSpeed(60)" title="1min/sec">60x</button>
    <button class="speed-btn" onclick="setSpeed(600)" title="10min/sec">600x</button>
    <button class="speed-btn" onclick="setSpeed(3600)" title="1hr/sec">3600x</button>
  </div>
  <div class="jump-controls">
    <button class="jump-btn" onclick="jumpSlot('morning')">AM</button>
    <button class="jump-btn" onclick="jumpSlot('afternoon')">PM</button>
    <button class="jump-btn" onclick="jumpSlot('evening')">Eve</button>
    <button class="jump-btn" onclick="jumpSlot('night')">Night</button>
    <button class="pause-btn" id="pauseBtn" onclick="togglePause()">Pause</button>
  </div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="time-divider" id="timeLabel">Today</div>
</div>

<!-- Typing -->
<div class="typing-indicator" id="typingIndicator">
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- Debug -->
<div class="debug-panel" id="debugPanel"></div>

<!-- Input -->
<div class="input-area">
  <textarea id="userInput" placeholder="Type a message..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
let debugVisible = false;
let sending = false;       // true while an LLM request is in-flight
let messageQueue = [];     // queued messages waiting to be sent
let pollInterval = null;
let isPaused = false;
let currentSpeed = 60;
let timeUpdateInterval = null;

// ---- Init ----

fetch('/api/status').then(r => r.json()).then(data => {
  if (data.character_loaded) {
    document.getElementById('initOverlay').classList.add('hidden');
    updateHeader(data);
    if (data.time) updateTimeDisplay(data.time);
    startEventPolling();
  } else if (data.character_exists) {
    document.getElementById('loadBtn').style.display = 'inline-block';
  }
}).catch(() => {});

function initNew() {
  const btns = document.getElementById('initButtons');
  const loading = document.getElementById('initLoading');
  btns.style.display = 'none';
  loading.classList.add('visible');

  fetch('/api/init', { method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'new'})
  }).then(r => r.json()).then(data => {
    if (data.success) {
      document.getElementById('initStatus').textContent = 'Character ready!';
      setTimeout(() => {
        document.getElementById('initOverlay').classList.add('hidden');
        updateHeader(data);
        if (data.time) updateTimeDisplay(data.time);
        if (data.snapshot) {
          addCharMessage([{type: 'text', content: data.snapshot}]);
        }
        startEventPolling();
      }, 500);
    } else {
      document.getElementById('initStatus').textContent = 'Failed: ' + (data.error || 'Unknown error');
      btns.style.display = 'block';
    }
  }).catch(e => {
    document.getElementById('initStatus').textContent = 'Network error: ' + e.message;
    btns.style.display = 'block';
  });
}

function loadExisting() {
  const btns = document.getElementById('initButtons');
  const loading = document.getElementById('initLoading');
  btns.style.display = 'none';
  loading.classList.add('visible');
  document.getElementById('initStatus').textContent = 'Loading character...';

  fetch('/api/init', { method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'load'})
  }).then(r => r.json()).then(data => {
    if (data.success) {
      document.getElementById('initOverlay').classList.add('hidden');
      updateHeader(data);
      if (data.time) updateTimeDisplay(data.time);
      startEventPolling();
    } else {
      document.getElementById('initStatus').textContent = 'Load failed';
      btns.style.display = 'block';
    }
  });
}

// ---- Header ----

function updateHeader(data) {
  const name = data.name || 'Character';
  document.getElementById('charName').textContent = name;
  document.getElementById('charAvatar').textContent = name[0];
  document.getElementById('charStatus').textContent = data.status_line || 'Online';
  document.title = name + ' - Chat';
}

// ---- Time Controls ----

function updateTimeDisplay(timeData) {
  if (!timeData) return;
  const el = document.getElementById('timeDisplay');
  el.textContent = timeData.display || '--:--';

  isPaused = timeData.paused;
  currentSpeed = timeData.speed;

  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';

  // Highlight active speed button
  document.querySelectorAll('.speed-btn').forEach(btn => btn.classList.remove('active'));
  if (isPaused) {
    document.querySelector('.speed-btn[onclick="setSpeed(0)"]').classList.add('active');
  } else {
    const speedMap = {1: '1', 60: '60', 600: '600', 3600: '3600'};
    const match = document.querySelector(`.speed-btn[onclick="setSpeed(${currentSpeed})"]`);
    if (match) match.classList.add('active');
  }
}

function setSpeed(speed) {
  if (speed === 0) {
    fetch('/api/time/pause', { method: 'POST' })
      .then(r => r.json()).then(updateTimeDisplay);
    return;
  }
  // Resume first if paused
  const chain = isPaused
    ? fetch('/api/time/resume', { method: 'POST' }).then(r => r.json())
    : Promise.resolve();

  chain.then(() => {
    fetch('/api/time/speed', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({speed: speed})
    }).then(r => r.json()).then(updateTimeDisplay);
  });
}

function togglePause() {
  const url = isPaused ? '/api/time/resume' : '/api/time/pause';
  fetch(url, { method: 'POST' }).then(r => r.json()).then(updateTimeDisplay);
}

function jumpSlot(slot) {
  fetch('/api/time/jump', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({slot: slot})
  }).then(r => r.json()).then(data => {
    updateTimeDisplay(data);
    addTimeDivider(`Jumped to ${slot}`);
  });
}

// ---- Event Polling (Proactive Messages) ----

function startEventPolling() {
  // Poll for proactive events every 3 seconds
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(pollEvents, 3000);

  // Also update time display every 2 seconds
  if (timeUpdateInterval) clearInterval(timeUpdateInterval);
  timeUpdateInterval = setInterval(() => {
    fetch('/api/time').then(r => r.json()).then(updateTimeDisplay).catch(() => {});
  }, 2000);
}

async function pollEvents() {
  // Allow polling even while sending — proactive events can still arrive

  try {
    const resp = await fetch('/api/events');
    const data = await resp.json();

    if (data.events && data.events.length > 0) {
      for (const evt of data.events) {
        await displayProactiveMessage(evt);
      }
    }
  } catch (e) {
    // Silently ignore polling errors
  }

  // If debug panel is open, also fetch debug state for silence monitor
  if (debugVisible) {
    try {
      const dbgResp = await fetch('/api/debug/state');
      const dbgData = await dbgResp.json();
      updateDebugSilence(dbgData);
    } catch (e) {}
  }
}

function updateDebugSilence(data) {
  const panel = document.getElementById('debugPanel');
  if (!panel) return;

  // --- Silence info ---
  let silenceDiv = document.getElementById('debugSilenceInfo');
  if (!silenceDiv) {
    silenceDiv = document.createElement('div');
    silenceDiv.id = 'debugSilenceInfo';
    panel.appendChild(silenceDiv);
  }
  const s = data.silence || {};
  const phaseColors = ['#4ecdc4', '#ffd93d', '#ff9f43', '#ff6b6b', '#ee5a24'];
  const phaseColor = phaseColors[s.phase || 0] || '#999';
  let html = `<div class="section" style="margin-top:6px;border-top:1px solid #333;padding-top:4px;">`;
  html += `<span class="label">Silence: </span>`;
  html += `<span class="value" style="color:${phaseColor};">Phase ${s.phase || 0}</span>`;
  html += ` <span class="value">(${(s.silence_virtual_min || 0).toFixed(0)} vmin, ${(s.silence_real_sec || 0).toFixed(0)}s real)</span>`;
  if (s.no_reply_pressure > 0) {
    html += `<br><span class="label">No-reply pressure: </span>`;
    html += `<span class="value" style="color:#ff6b6b;">${s.no_reply_pressure.toFixed(3)}/1.0</span>`;
  }
  if (s.messages_sent !== undefined) {
    html += `<br><span class="label">Silence msgs: </span>`;
    html += `<span class="value">${s.messages_sent}/${s.message_limit} (energy: ${(s.current_energy || 0).toFixed(2)}, need: ${s.energy_threshold})</span>`;
  }
  html += `</div>`;
  silenceDiv.innerHTML = html;

  // --- Relationship Judge ---
  let judgeDiv = document.getElementById('debugJudgeInfo');
  if (!judgeDiv) {
    judgeDiv = document.createElement('div');
    judgeDiv.id = 'debugJudgeInfo';
    panel.appendChild(judgeDiv);
  }
  const j = data.relationship_judge || {};
  let jhtml = `<div class="section" style="margin-top:6px;border-top:1px solid #333;padding-top:4px;">`;
  jhtml += `<span class="label" style="color:#ff8fab;">Relationship Judge:</span><br>`;
  jhtml += `<span class="label">  Label: </span><span class="value" style="color:#ff8fab;">${j.relationship_label || '?'}</span><br>`;
  jhtml += `<span class="label">  Goal: </span><span class="value" style="color:#ffd93d;">${j.relationship_goal || '?'}</span><br>`;
  jhtml += `<span class="label">  Speculation: </span><span class="value" style="color:#45b7d1;">${j.user_speculation || '?'}</span>`;
  if (j.eval_count > 0) {
    jhtml += `<br><span class="label">  Evals: </span><span class="value">${j.eval_count} (last at turn ${j.last_eval_turn})</span>`;
  }
  jhtml += `</div>`;
  judgeDiv.innerHTML = jhtml;
}

async function displayProactiveMessage(evt) {
  const name = document.getElementById('charName').textContent;

  // Show typing indicator briefly
  showTyping();
  await sleep(600 + Math.random() * 1000);
  hideTyping();

  // Add time context divider
  if (evt.time_display) {
    addTimeDivider(evt.time_display);
  }

  // Show messages with stagger
  if (evt.messages) {
    for (let i = 0; i < evt.messages.length; i++) {
      if (i > 0) {
        showTyping();
        await sleep(400 + Math.random() * 600);
        hideTyping();
      }
      addCharMessage([evt.messages[i]], true);
    }
  }

  // Update debug panel
  if (evt.status || evt.inner_thought) {
    updateDebug(evt);
  }

  // Play a subtle notification sound (optional, browser-permitting)
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    gain.gain.value = 0.05;
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  } catch (e) {}
}

// ---- Debug Panel ----

function toggleDebug() {
  debugVisible = !debugVisible;
  document.getElementById('debugPanel').classList.toggle('visible', debugVisible);
}

function updateDebug(data) {
  if (!debugVisible) return;
  const panel = document.getElementById('debugPanel');
  const status = data.status || {};
  let html = '';

  // Emotion axes visualization (v2.1)
  if (status.emotion_axes) {
    html += `<div class="section"><span class="label">Emotion Vector:</span></div>`;
    const axisLabels = {joy:'喜',sadness:'悲',anger:'怒',anxiety:'虑',trust:'信',disgust:'厌',attachment:'恋'};
    const axisColors = {joy:'#4ecdc4',sadness:'#45b7d1',anger:'#ff6b6b',anxiety:'#ffd93d',trust:'#6bcb77',disgust:'#c77dff',attachment:'#ff8fab'};
    for (const [axis, val] of Object.entries(status.emotion_axes)) {
      const pct = Math.round(val * 100);
      const label = axisLabels[axis] || axis;
      const color = axisColors[axis] || '#4ecdc4';
      html += `<div class="section" style="display:flex;align-items:center;gap:4px;">
        <span style="width:20px;color:${color};font-weight:bold;">${label}</span>
        <div style="flex:1;height:8px;background:#333;border-radius:4px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:${color};transition:width 0.3s;"></div>
        </div>
        <span class="value" style="width:32px;text-align:right;font-size:10px;">${val.toFixed(2)}</span>
      </div>`;
    }
  }

  // Tension states
  if (status.tensions && status.tensions[0] !== 'none') {
    html += `<div class="section"><span class="label">Tensions: </span><span class="value" style="color:#ff6b6b;">${status.tensions.join(', ')}</span></div>`;
  }

  // Pressure channels
  if (status.pressures && Object.keys(status.pressures).length > 0) {
    html += `<div class="section"><span class="label">Pressures: </span><span class="value">${JSON.stringify(status.pressures)}</span></div>`;
  }

  // Other status fields
  const skipKeys = ['emotion_axes', 'tensions', 'pressures'];
  for (const [key, val] of Object.entries(status)) {
    if (skipKeys.includes(key)) continue;
    html += `<div class="section"><span class="label">${key}: </span><span class="value">${
      typeof val === 'object' ? JSON.stringify(val) : val
    }</span></div>`;
  }

  if (data.inner_thought) {
    html += `<div class="thought">Inner: ${escapeHtml(data.inner_thought)}</div>`;
  }

  if (data.event_type) {
    html += `<div class="section"><span class="label">event_type: </span><span class="value">${data.event_type}</span></div>`;
  }
  if (data.storyline_event) {
    html += `<div class="section"><span class="label">storyline: </span><span class="value">${escapeHtml(data.storyline_event)}</span></div>`;
  }

  panel.innerHTML = html;
}

// ---- Chat Messages ----

function addUserMessage(text) {
  const chatArea = document.getElementById('chatArea');
  const group = document.createElement('div');
  group.className = 'message-group user';
  group.innerHTML = `
    <div class="msg-avatar user-avatar">Me</div>
    <div class="msg-bubbles">
      <div class="bubble">${escapeHtml(text)}</div>
    </div>
  `;
  chatArea.appendChild(group);
  scrollToBottom();
}

function addCharMessage(messages, isProactive = false) {
  const chatArea = document.getElementById('chatArea');
  const name = document.getElementById('charName').textContent;

  const group = document.createElement('div');
  group.className = 'message-group char' + (isProactive ? ' proactive' : '');

  let bubblesHtml = '';
  if (isProactive) {
    bubblesHtml += `<div class="proactive-label">sent a message</div>`;
  }
  for (const msg of messages) {
    if (msg.type === 'read') {
      bubblesHtml += `<div class="bubble read-receipt">Read</div>`;
    } else {
      bubblesHtml += `<div class="bubble">${escapeHtml(msg.content)}</div>`;
    }
  }

  group.innerHTML = `
    <div class="msg-avatar char-avatar">${name[0]}</div>
    <div class="msg-bubbles">${bubblesHtml}</div>
  `;
  chatArea.appendChild(group);
  scrollToBottom();
}

function addTimeDivider(text) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'time-divider';
  div.textContent = text;
  chatArea.appendChild(div);
}

function showTyping() {
  const indicator = document.getElementById('typingIndicator');
  indicator.style.display = 'block';
  document.getElementById('charStatus').textContent = 'Typing...';
  scrollToBottom();
}

function hideTyping() {
  document.getElementById('typingIndicator').style.display = 'none';
  document.getElementById('charStatus').textContent = 'Online';
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  // Always accept user input immediately — never block
  input.value = '';
  autoResize(input);
  addUserMessage(text);

  // Queue the message
  messageQueue.push(text);

  // If not already processing, start the processing loop
  if (!sending) {
    processMessageQueue();
  }
}

async function processMessageQueue() {
  if (sending || messageQueue.length === 0) return;
  sending = true;

  while (messageQueue.length > 0) {
    // Grab all queued messages (user may have sent several while LLM was thinking)
    // If there's just 1, send it normally. If multiple, batch them.
    const batch = messageQueue.splice(0);  // take all
    const combined = batch.join('\n');

    showTyping();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: combined})
      });
      const data = await resp.json();

      // Brief typing delay for realism
      await sleep(500 + Math.random() * 500);
      hideTyping();

      if (data.blocked) {
        // Message was blocked (JSON parse failure) — show only in debug, not in chat
        console.log('[Chat] Response blocked — showing in debug only');
      } else if (data.messages && data.messages.length > 0) {
        for (let i = 0; i < data.messages.length; i++) {
          if (i > 0) {
            showTyping();
            await sleep(300 + Math.random() * 600);
            hideTyping();
          }
          addCharMessage([data.messages[i]]);
        }
      }

      updateDebug(data);

      if (data.time) {
        updateTimeDisplay(data.time);
      }

      if (data.status) {
        const mood = data.status.mood || '';
        document.getElementById('charStatus').textContent = mood ? `Mood: ${mood}` : 'Online';
      }

    } catch (e) {
      hideTyping();
      addCharMessage([{type: 'text', content: '[Connection lost...]'}]);
    }

    // Check if more messages arrived during LLM processing
    // If so, loop continues and batches them
  }

  sending = false;
  document.getElementById('userInput').focus();
}

// ---- Utility ----

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const chatArea = document.getElementById('chatArea');
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}
</script>
